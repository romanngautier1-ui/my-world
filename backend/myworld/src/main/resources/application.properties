spring.application.name=myworld

# Common configuration (no secrets committed)
# Provide DB/JWT/Mail settings via environment variables, or use the `local` profile.

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Run seed script after Hibernate creates the schema
# Spring SQL init is off by default; the local profile enables it.
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.data-locations=classpath:db/mysql/data.sql
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5VHJlc0xvbmdFdFNlY3VyaXNlZVBvdXJKV1Q=}
jwt.expiration=${JWT_EXPIRATION_MS:43200000}

# Frontend base URL (used in verification/reset-password emails)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# CORS (comma-separated)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}

# Uploads (served via GET /api/uploads/{filename})
# macOS/dev: prefer a writable folder in the user's home.
# Prod (Linux): you can override to /var/myworld/uploads via env/property.
app.upload.dir=${user.home}/myworld/uploads

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator (health/info only by default)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never