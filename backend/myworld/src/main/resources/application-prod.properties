# Production profile
# Run: java -jar target/myworld-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod

# In prod, everything should come from environment variables / secret manager.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# JWT (required)
jwt.secret=${JWT_SECRET}

# Frontend URL + CORS should match the deployed frontend
app.frontend.base-url=${APP_FRONTEND_BASE_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
