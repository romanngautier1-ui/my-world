# Local development profile
# Run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

# Local MySQL (MAMP example: port 8889)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:8889/myworld1?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Seed sample data for local dev
spring.sql.init.mode=always

# Dev-only JWT secret (override with JWT_SECRET if you want)
# Must be >= 32 bytes for HS256.
jwt.secret=${JWT_SECRET:myworld-local-dev-secret-change-me-please-32bytes+}
