<div class="reset-password-page">
	<app-navbar></app-navbar>
	<div class="background reset-password-body">
		<div class="container py-4 reset-password-content">
			<div class="row justify-content-center">
				<div class="col-12 col-md-8 col-lg-5 col-xl-4">
					<div class="card border-0 shadow-sm contact-card">
						<div class="card-body p-4">
							<h3 class="card-title text-center mb-1">Mot de passe oublié</h3>
							<p class="text-center text-muted small mb-4">{{ message() }}</p>

							<form (submit)="onSubmit($event)">
								<div class="mb-3">
									<label for="email" class="form-label">Email</label>
									<input
										#emailField
										id="email"
										type="email"
										name="email"
										class="form-control contact-input"
										autocomplete="email"
										[value]="email()"
										(input)="email.set(emailField.value)"
										required
									/>
									<div class="form-text">
										Tu recevras un lien de réinitialisation si un compte existe.
									</div>
								</div>

								<div class="d-grid">
									<button
										type="submit"
										class="btn btn-primary"
										[disabled]="!isFormValid() || isLoading()"
									>
										{{ isLoading() ? 'Envoi...' : 'Envoyer le lien' }}
									</button>
								</div>
							</form>

							<div class="d-flex flex-column gap-1 mt-3">
								<a class="btn btn-link text-decoration-none" routerLink="/login">Retour</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<app-footer></app-footer>
	</div>
</div>
