<div class="reset-password-link-page">
	<app-navbar></app-navbar>
	<div class="background reset-password-link-body">
		<div class="container py-4 reset-password-link-content">
			<div class="row justify-content-center">
				<div class="col-12 col-md-8 col-lg-5 col-xl-4">
					<div class="card border-0 shadow-sm contact-card">
						<div class="card-body p-4">
							<h3 class="card-title text-center mb-1">Nouveau mot de passe</h3>
							<p class="text-center text-muted small mb-4">{{ message() }}</p>

							<form (submit)="onSubmit($event)">
								<div class="mb-3">
									<label for="newPassword" class="form-label">Mot de passe</label>
									<input
										#newPasswordField
										id="newPassword"
										type="password"
										name="newPassword"
										class="form-control contact-input"
										autocomplete="new-password"
										[value]="newPassword()"
										(input)="newPassword.set(newPasswordField.value)"
										required
									/>
								</div>

								<div class="mb-3">
									<label for="confirmPassword" class="form-label">Confirmation</label>
									<input
										#confirmPasswordField
										id="confirmPassword"
										type="password"
										name="confirmPassword"
										class="form-control contact-input"
										autocomplete="new-password"
										[value]="confirmPassword()"
										(input)="confirmPassword.set(confirmPasswordField.value)"
										required
									/>
								</div>

								<div class="d-grid">
									<button
										type="submit"
										class="btn btn-primary"
										[disabled]="!isFormValid() || isLoading()"
									>
										{{ isLoading() ? 'Mise à jour...' : 'Mettre à jour' }}
									</button>
								</div>
							</form>

							<div class="d-flex flex-column gap-1 mt-3">
								<a class="btn btn-link text-decoration-none" routerLink="/login">Retour</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<app-footer></app-footer>
	</div>
</div>
