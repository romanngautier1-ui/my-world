<app-navbar></app-navbar>
<div class="background">
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5 col-xl-4">
      <div class="card border-0 shadow-sm contact-card">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-1">Créer un compte</h3>
          <p class="text-center text-muted small mb-4">{{ errorMessage() }}</p>

          <form (submit)="onSubmit($event)">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input
                #emailField
                id="email"
                type="text"
                name="email"
                class="form-control contact-input"
                autocomplete="username"
                [value]="email()"
                (input)="email.set(emailField.value)"
                required
              />
            </div>
            <div class="mb-3">
              <label for="username" class="form-label">Pseudo</label>
              <input
                #usernameField
                id="username"
                type="text"
                name="username"
                class="form-control contact-input"
                autocomplete="username"
                [value]="username()"
                (input)="username.set(usernameField.value)"
                required
              />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Mot de passe</label>
              <input
                #passwordField
                id="password"
                type="password"
                name="password"
                class="form-control contact-input"
                autocomplete="current-password"
                [value]="password()"
                (input)="password.set(passwordField.value)"
                required
              />
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirmation Mot de passe</label>
              <input
                #confirmPasswordField
                id="confirmPassword"
                type="password"
                name="confirmPassword"
                class="form-control contact-input"
                autocomplete="current-password"
                [value]="confirmPassword()"
                (input)="confirmPassword.set(confirmPasswordField.value)"
                required
              />
            </div>
            <div class="d-grid">
            <button 
                class="btn btn-primary"
                type="submit"
                [disabled]="!isFormValid() || isLoading()">
                {{ isLoading() ? 'Création...' : 'Créer le compte' }}
            </button>
            </div>
          </form>
          <div class="d-flex flex-column gap-1 mt-3">
            <a class="btn btn-link text-decoration-none" routerLink="/login">Retour</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
</div>
