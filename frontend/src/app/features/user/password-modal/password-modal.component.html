@if (isOpen()) {
	<div class="modal-backdrop show" (click)="onBackdropClick()"></div>
	<div class="modal show d-block" tabindex="-1" role="dialog" aria-modal="true">
		<div class="modal-dialog" role="document">
			<div class="modal-content" (click)="$event.stopPropagation()">
				<div class="modal-header">
					<h5 class="modal-title">Changer le mot de passe</h5>
					<button type="button" class="btn-close" aria-label="Close" (click)="close.emit()"></button>
				</div>
				<div class="modal-body">
					@if (message()) {
						<div class="alert alert-info" role="alert">
							{{ message() }}
						</div>
					}

					<form (submit)="onSubmit($event)">
						<div class="mb-3">
							<label for="oldPassword" class="form-label">Ancien mot de passe</label>
							<input
								#oldPasswordField
								id="oldPassword"
								type="password"
								name="oldPassword"
								class="form-control"
								autocomplete="current-password"
								[value]="oldPassword()"
								(input)="oldPassword.set(oldPasswordField.value)"
								required
							/>
						</div>

						<div class="mb-3">
							<label for="newPassword" class="form-label">Nouveau mot de passe</label>
							<input
								#newPasswordField
								id="newPassword"
								type="password"
								name="newPassword"
								class="form-control"
								autocomplete="new-password"
								[value]="newPassword()"
								(input)="newPassword.set(newPasswordField.value)"
								required
							/>
							<div class="form-text">Minimum 6 caractères.</div>
						</div>

						<div class="mb-3">
							<label for="confirmPassword" class="form-label">Confirmer le nouveau mot de passe</label>
							<input
								#confirmPasswordField
								id="confirmPassword"
								type="password"
								name="confirmPassword"
								class="form-control"
								autocomplete="new-password"
								[value]="confirmPassword()"
								(input)="confirmPassword.set(confirmPasswordField.value)"
								required
							/>
						</div>
						<div class="d-grid">
							<button type="submit" class="btn btn-primary" [disabled]="!isFormValid">
								Changer le mot de passe
							</button>
						</div>
					</form>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" (click)="onBackdropClick()">Fermer</button>
				</div>
			</div>
		</div>
	</div>
}
